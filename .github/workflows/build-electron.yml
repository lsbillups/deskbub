name: Build DeskBub Desktop App

on:
  push:
    branches: [main, master]
    paths:
      - 'desktop-pet/**'
      - '.github/workflows/build-electron.yml'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop-pet
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx electron-builder --win --x64
      - name: Rename
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path dist -Filter "*.exe" | Select-Object -First 1
          Rename-Item -Path $exe.FullName -NewName "DeskBub-Windows.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: DeskBub-Windows
          path: desktop-pet/dist/DeskBub-Windows.exe

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: desktop-pet
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx electron-builder --mac --x64
      - run: |
          mv dist/*.dmg dist/DeskBub-macOS.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: DeskBub-macOS
          path: desktop-pet/dist/DeskBub-macOS.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: DeskBub-Windows
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: DeskBub-macOS
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          files: |
            dist/DeskBub-Windows.exe
            dist/DeskBub-macOS.dmg
