name: Build DeskBub Desktop App

on:
  push:
    branches: [main, master]
    paths:
      - 'desktop-pet/**'
      - '.github/workflows/build-electron.yml'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop-pet

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npx electron-builder --win --x64

      - name: Rename and upload to Supabase
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          mv dist/*.exe dist/DeskBub-Windows.exe
          curl -X PUT "$SUPABASE_URL/storage/v1/object/pet-photos/releases/DeskBub-Windows.exe" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @dist/DeskBub-Windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeskBub-Windows
          path: desktop-pet/dist/DeskBub-Windows.exe

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: desktop-pet

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build macOS installer
        run: npx electron-builder --mac --x64

      - name: Rename and upload to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          dmg=$(ls dist/*.dmg 2>/dev/null | head -1)
          mv "$dmg" dist/DeskBub-macOS.dmg
          curl -X PUT "$SUPABASE_URL/storage/v1/object/pet-photos/releases/DeskBub-macOS.dmg" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"dist/DeskBub-macOS.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeskBub-macOS
          path: desktop-pet/dist/DeskBub-macOS.dmg
