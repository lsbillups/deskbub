name: Build DeskBub Desktop App

on:
  push:
    branches: [main, master]
    paths:
      - 'desktop-pet/**'
      - '.github/workflows/build-electron.yml'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop-pet

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npx electron-builder --win --x64

      - name: Rename installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path dist -Filter "*.exe" | Select-Object -First 1
          Rename-Item -Path $exe.FullName -NewName "DeskBub-Windows.exe"

      - name: Upload to Supabase Storage
        uses: lesnitsky/upload-to-supabase@v1
        with:
          supabase_url: ${{ secrets.SUPABASE_URL }}
          supabase_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          bucket: pet-photos
          src: desktop-pet/dist/DeskBub-Windows.exe
          dst: releases/DeskBub-Windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeskBub-Windows
          path: desktop-pet/dist/DeskBub-Windows.exe

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: desktop-pet

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build macOS installer
        run: npx electron-builder --mac --x64

      - name: Rename installer
        run: |
          dmg=$(ls dist/*.dmg 2>/dev/null | head -1)
          mv "$dmg" dist/DeskBub-macOS.dmg

      - name: Upload to Supabase Storage
        uses: lesnitsky/upload-to-supabase@v1
        with:
          supabase_url: ${{ secrets.SUPABASE_URL }}
          supabase_key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          bucket: pet-photos
          src: desktop-pet/dist/DeskBub-macOS.dmg
          dst: releases/DeskBub-macOS.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeskBub-macOS
          path: desktop-pet/dist/DeskBub-macOS.dmg
