<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeskBub Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #FFFBF5;
      color: #2D3436;
      padding: 24px;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .setting-group {
      background: white;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 12px;
      border: 1px solid #e5e7eb;
    }
    .setting-group label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      font-weight: 500;
    }
    .setting-group .desc {
      font-size: 12px;
      color: #636E72;
      margin-top: 4px;
    }
    select, input[type="range"] {
      padding: 6px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      background: white;
    }
    input[type="range"] {
      width: 120px;
    }
    .range-value {
      font-size: 13px;
      font-weight: 600;
      color: #FF6B6B;
      min-width: 40px;
      text-align: right;
    }
    .btn-save {
      width: 100%;
      padding: 12px;
      margin-top: 16px;
      background: #FF6B6B;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-save:hover { background: #E55A5A; }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      background: #2D3436;
      color: white;
      border-radius: 10px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <h1>🐾 DeskBub Settings</h1>

  <div class="setting-group">
    <label>
      <div>
        Sit reminder interval
        <div class="desc">How often to remind you to stand up and stretch</div>
      </div>
      <select id="sitReminder">
        <option value="30">30 minutes</option>
        <option value="50" selected>50 minutes</option>
        <option value="60">60 minutes</option>
        <option value="90">90 minutes</option>
      </select>
    </label>
  </div>

  <div class="setting-group">
    <label>
      <div>
        Water reminder interval
        <div class="desc">How often to nudge you to drink water</div>
      </div>
      <select id="waterReminder">
        <option value="60">60 minutes</option>
        <option value="90" selected>90 minutes</option>
        <option value="120">120 minutes</option>
      </select>
    </label>
  </div>

  <div class="setting-group">
    <label>
      <div>
        Pet opacity
        <div class="desc">How transparent your desktop pet appears</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="range" id="opacity" min="30" max="100" value="90" />
        <span class="range-value" id="opacityValue">90%</span>
      </div>
    </label>
  </div>

  <div class="setting-group">
    <label>
      <div>
        Pet size
        <div class="desc">Make your pet bigger or smaller</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="range" id="petSize" min="50" max="150" value="100" />
        <span class="range-value" id="sizeValue">100%</span>
      </div>
    </label>
  </div>

  <button class="btn-save" onclick="saveSettings()">Save Settings</button>

  <div class="toast" id="toast">Saved!</div>

  <script>
    const toast = document.getElementById('toast');
    const opacitySlider = document.getElementById('opacity');
    const opacityValue = document.getElementById('opacityValue');
    const sizeSlider = document.getElementById('petSize');
    const sizeValue = document.getElementById('sizeValue');

    opacitySlider.addEventListener('input', () => {
      opacityValue.textContent = opacitySlider.value + '%';
    });
    sizeSlider.addEventListener('input', () => {
      sizeValue.textContent = sizeSlider.value + '%';
    });

    // Load config
    async function loadConfig() {
      if (window.deskBub) {
        const cfg = await window.deskBub.getConfig();
        document.getElementById('sitReminder').value = cfg.sitReminder || 50;
        document.getElementById('waterReminder').value = cfg.waterReminder || 90;
        opacitySlider.value = Math.round((cfg.opacity || 0.9) * 100);
        opacityValue.textContent = opacitySlider.value + '%';
        sizeSlider.value = Math.round((cfg.petSize || 1.0) * 100);
        sizeValue.textContent = sizeSlider.value + '%';
      }
    }

    async function saveSettings() {
      const cfg = {
        sitReminder: parseInt(document.getElementById('sitReminder').value),
        waterReminder: parseInt(document.getElementById('waterReminder').value),
        opacity: parseInt(opacitySlider.value) / 100,
        petSize: parseInt(sizeSlider.value) / 100,
      };

      if (window.deskBub) {
        await window.deskBub.saveConfig(cfg);
      } else {
        localStorage.setItem('deskbub-config', JSON.stringify(cfg));
      }

      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    loadConfig();
  </script>
</body>
</html>
