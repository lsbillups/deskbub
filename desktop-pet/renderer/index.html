<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; background: transparent; overflow: hidden; user-select: none;
    }
    canvas { display: block; }
    #bubble {
      position: absolute; background: white; border-radius: 14px;
      padding: 10px 14px; font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px; color: #2D3436; max-width: 220px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12); opacity: 0;
      pointer-events: none; transition: opacity 0.4s; z-index: 10;
    }
    #bubble::after {
      content: ''; position: absolute; bottom: -7px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0; border-left: 7px solid transparent;
      border-right: 7px solid transparent; border-top: 7px solid white;
    }
    #bubble.show { opacity: 1; }
    #url-bar {
      position: absolute; bottom: 12px; left: 12px; right: 12px;
      display: flex; gap: 6px; z-index: 20;
      background: rgba(255,255,255,0.92); padding: 8px; border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15); border: 2px solid #FF6B6B;
      transition: opacity 0.4s;
    }
    #url-bar input {
      flex: 1; padding: 8px 12px; border: 2px solid #ddd; border-radius: 10px;
      font-size: 12px; background: rgba(255,255,255,0.98); outline: none;
    }
    #url-bar button {
      padding: 8px 16px; border: none; border-radius: 10px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      background: #FF6B6B; color: white; white-space: nowrap;
    }
    #url-bar button:hover { background: #E55A5A; }
    #hint {
      position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%);
      font-family: 'Segoe UI', sans-serif; font-size: 11px;
      color: rgba(0,0,0,0.4); pointer-events: none; z-index: 5;
    }
  </style>
</head>
<body>
  <div id="bubble"></div>
  <div id="url-bar">
    <input type="text" id="glbUrl" placeholder="Paste .glb 3D model URL here, then click Load" />
    <button onclick="loadGLB()">Load 3D Pet</button>
  </div>
  <div id="hint">Double-click to enter model URL · Esc to hide</div>
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
  </script>
  <script type="module" src="pet3d.js"></script>
</body>
</html>
