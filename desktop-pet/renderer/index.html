<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; user-select: none; }
    video { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; opacity: 0; }
    canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
    #bubble {
      position: absolute; background: white; border-radius: 14px;
      padding: 10px 14px; font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px; color: #2D3436; max-width: 220px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12); opacity: 0;
      pointer-events: none; transition: opacity 0.4s; z-index: 10;
    }
    #bubble::after {
      content: ''; position: absolute; bottom: -7px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0; border-left: 7px solid transparent;
      border-right: 7px solid transparent; border-top: 7px solid white;
    }
    #bubble.show { opacity: 1; }
    #url-bar {
      position: absolute; top: 12px; left: 12px; right: 12px; z-index: 20;
      background: rgba(255,255,255,0.92); padding: 8px; border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15); border: 2px solid #FF6B6B;
      display: flex; gap: 6px; transition: opacity 0.4s;
    }
    #url-bar.hidden { opacity: 0; pointer-events: none; }
    #url-bar input { flex: 1; padding: 8px 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 12px; background: rgba(255,255,255,0.98); outline: none; }
    #url-bar button { padding: 8px 16px; border: none; border-radius: 10px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    #url-bar .load-btn { background: #FF6B6B; color: white; }
    #url-bar .load-btn:hover { background: #E55A5A; }
    #url-bar .toggle-btn { background: #4ECDC4; color: white; font-size: 11px; }
    #hint { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); font-family: 'Segoe UI', sans-serif; font-size: 11px; color: rgba(0,0,0,0.4); pointer-events: none; z-index: 5; }
    #status { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-family: 'Segoe UI', sans-serif; font-size: 16px; color: #FF6B6B; pointer-events: none; z-index: 5; display: none; }
  </style>
</head>
<body>
  <video id="petVideo" loop muted playsInline style="display:none"></video>
  <canvas id="pet3d" style="display:none"></canvas>
  <div id="bubble"></div>
  <div id="status"></div>
  <div id="url-bar">
    <input type="text" id="pairingCode" placeholder="6-digit code" style="width:80px;flex:none;" maxlength="6" />
    <button class="load-btn" onclick="loadByCode()" style="background:#4ECDC4;">Pair</button>
    <input type="text" id="mediaUrl" placeholder="Or paste video URL directly" />
    <button class="load-btn" onclick="loadMedia()">Load</button>
  </div>
  <div id="hint">Double-click for URL bar · Esc to hide · Enter pairing code from Dashboard → Pair</div>

  <script src="video-pet.js"></script>
</body>
</html>
