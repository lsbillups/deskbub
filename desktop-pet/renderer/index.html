<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
    }
    canvas { display: block; position: absolute; top: 0; left: 0; }
    #bubble {
      position: absolute;
      background: white; border-radius: 14px;
      padding: 10px 14px; font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px; color: #2D3436; max-width: 220px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12); opacity: 0;
      pointer-events: none; transition: opacity 0.4s; z-index: 10;
    }
    #bubble::after {
      content: ''; position: absolute; bottom: -7px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0; border-left: 7px solid transparent;
      border-right: 7px solid transparent; border-top: 7px solid white;
    }
    #bubble.show { opacity: 1; }
    #url-bar {
      position: absolute; bottom: 12px; left: 12px; right: 12px;
      display: flex; gap: 6px; z-index: 20; opacity: 0.85; transition: opacity 0.3s;
    }
    #url-bar:hover { opacity: 1; }
    #url-bar input {
      flex: 1; padding: 8px 12px; border: 2px solid #ddd; border-radius: 10px;
      font-size: 12px; background: rgba(255,255,255,0.98); outline: none;
    }
    #url-bar button {
      padding: 8px 16px; border: none; border-radius: 10px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      background: #FF6B6B; color: white; white-space: nowrap;
    }
    #url-bar button:hover { background: #E55A5A; }
  </style>
</head>
<body>
  <canvas id="petCanvas"></canvas>
  <div id="bubble"></div>
  <div id="url-bar">
    <input type="text" id="imgUrl" placeholder="Paste processed pet image URL..." />
    <button onclick="loadPetImage()">Load</button>
    <button onclick="resetPet()" style="background:#636E72;">🔄</button>
  </div>
  <script src="pet.js"></script>
  <script src="reminders.js"></script>
</body>
</html>
