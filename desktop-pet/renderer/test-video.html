<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Video Test</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; background:#111; }
  video { width:100%; height:100%; object-fit:contain; }
  #bar { position:absolute; top:10px; left:10px; right:10px; display:flex; gap:6px; z-index:10; }
  #bar input { flex:1; padding:8px 12px; border-radius:8px; border:none; font-size:12px; }
  #bar button { padding:8px 16px; border:none; border-radius:8px; background:#FF6B6B; color:white; font-weight:600; cursor:pointer; }
</style>
</head>
<body>
<video id="v" loop muted playsInline></video>
<div id="bar">
  <input id="url" placeholder="Paste video URL here" />
  <button onclick="load()">Load</button>
</div>
<script>
function load() {
  const url = document.getElementById('url').value.trim();
  if (!url) return;
  const v = document.getElementById('v');
  v.src = url;
  v.style.display = 'block';
  v.play().then(() => console.log('Playing!')).catch(e => alert('Error: ' + e.message));
}
</script>
</body>
</html>
